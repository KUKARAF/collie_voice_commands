<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Collie Voice Commands</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/app.css" />
  </head>
  <body class="kv-scanlines">
    <header class="app-bar" id="app-bar">
      <div class="app-bar__row">
        <div class="app-bar__brand">COLLIE<span class="cursor">_</span></div>
        <div class="app-bar__actions">
          <span class="chip" id="net-chip"><span class="chip__dot"></span>NET</span>
          <span class="chip" id="key-chip">KEY</span>
          <button class="app-bar__gear" id="settings-btn" title="Settings">⚙</button>
        </div>
      </div>
      <div class="talking-to-bar" id="talking-to-bar">
        <div class="talking-to-bar__pane">
          <span>&gt;</span>
          <span class="status-dot status-dot--idle" id="talking-to-dot"></span>
          <span class="truncate" id="talking-to-name">no pane selected</span>
        </div>
        <span class="chip" id="talking-to-status">—</span>
      </div>
    </header>

    <header class="back-header" id="back-header" style="display: none">
      <button class="back-header__back" id="back-btn">&lt;</button>
      <div class="back-header__title" id="back-header-title"></div>
      <span class="chip" id="back-header-chip" style="display: none"></span>
    </header>

    <div class="now-playing" id="now-playing" style="display: none">
      <div class="now-playing__row">
        <span class="now-playing__label">▶ NOW PLAYING</span>
        <div class="now-playing__waveform waveform" id="now-playing-waveform"></div>
        <span class="now-playing__time" id="now-playing-time">0:00</span>
        <button class="now-playing__toggle" id="now-playing-toggle">❚❚</button>
      </div>
      <div class="now-playing__text" id="now-playing-text"></div>
    </div>

    <main class="screen" id="screen"></main>

    <footer class="input-dock" id="input-dock">
      <input
        class="input-dock__field"
        id="command-input"
        type="text"
        placeholder="&gt; dictate a command"
        autocomplete="off"
      />
      <button class="btn btn--lg" id="talk-btn">▮ TALK</button>
    </footer>

    <div class="blocked-overlay" id="blocked-overlay">
      <div class="blocked-overlay__backdrop" id="blocked-overlay-backdrop"></div>
      <div class="blocked-overlay__sheet card card--accent">
        <div class="blocked-overlay__header">
          <span class="blocked-overlay__header-dot"></span>
          <span class="blocked-overlay__header-label">ATTENTION NEEDED</span>
        </div>
        <div class="blocked-overlay__pane-row">
          <span>&gt;</span>
          <span class="truncate" id="blocked-pane-name" style="flex: 1"></span>
          <span class="card__time" id="blocked-since"></span>
        </div>
        <div class="blocked-overlay__prompt" id="blocked-prompt"></div>
        <div class="blocked-overlay__options" id="blocked-options"></div>
        <button class="btn btn--lg blocked-overlay__voice-reply" id="blocked-voice-reply">▮ VOICE REPLY</button>
        <div class="blocked-overlay__footer">
          <button id="blocked-snooze">snooze 5m</button> ·
          <button id="blocked-dismiss">dismiss</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
